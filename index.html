<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Получить UDID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: #0a0e27;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Static mesh gradient background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(60, 122, 205, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(60, 122, 205, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(60, 122, 205, 0.3) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(60, 122, 205, 0.3) 0px, transparent 50%);
            background-size: 100% 100%;
            z-index: 0;
        }

        /* Static floating orbs - no animation */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: 1;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #3c7acd, #5a9bd5);
            top: -200px;
            right: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #3c7acd, #4a8bc7);
            bottom: -150px;
            left: -100px;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #3c7acd, #6aa3d9);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Grid pattern */
        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 2;
            pointer-events: none;
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 380px;
            padding: 50px 35px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(60, 122, 205, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: cardEnter 1s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        @keyframes cardEnter {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Icon with ring animation */
        .icon-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        .icon-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid rgba(60, 122, 205, 0.3);
            border-radius: 50%;
            animation: ringPulse 2s ease-out infinite;
        }

        .icon-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .icon-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes ringPulse {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .icon-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(60, 122, 205, 0.2), rgba(90, 155, 213, 0.2));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 0 60px rgba(60, 122, 205, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* External icon image */
        .icon-img {
            width: 56px;
            height: 56px;
            object-fit: contain;
        }

        /* Title */
        h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #8fb8e8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* Subtitle */
        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            position: relative;
            padding: 18px 28px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Primary button with gradient */
        .btn-primary {
            background: linear-gradient(135deg, #3c7acd 0%, #5a9bd5 50%, #4a8bc7 100%);
            background-size: 200% 200%;
            color: white;
            box-shadow: 
                0 10px 40px -10px rgba(60, 122, 205, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 20px 50px -10px rgba(60, 122, 205, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .btn-icon {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .btn:hover .btn-icon {
            transform: translateX(4px);
        }

        /* Shine effect on buttons */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.7s;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(60, 122, 205, 0.8);
            animation: particleFloat 15s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 28px;
            }
        }

        /* Safe area */
        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid"></div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Card -->
    <div class="card">
        <div class="icon-container">
            <div class="icon-ring"></div>
            <div class="icon-ring"></div>
            <div class="icon-ring"></div>
            <div class="icon-wrapper">
                <img src="img/icon.svg" alt="UDID Icon" class="icon-img">
            </div>
        </div>

        <h1>Получить UDID</h1>
        <p class="subtitle">
            Получите уникальный идентификатор устройства для установки приложений
        </p>

        <div class="buttons">
            <button class="btn btn-primary" onclick="getUDID()">
                <span>Получить UDID</span>
                <span class="btn-icon">→</span>
            </button>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0a0e27');
        tg.setBackgroundColor('#0a0e27');

        // Create particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Button click handlers
        function getUDID() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            const udidURL = 'https://get.udid.io/your-link';
            tg.openLink(udidURL);
        }

        // Add ripple effect
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.6);
                    left: ${x}px;
                    top: ${y}px;
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out;
                    pointer-events: none;
                `;
                
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
