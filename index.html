<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UDID Device</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --snow: #F8FAFF;
            --ice: #EEF4FF;
            --blue-light: #BFDBFE;
            --blue: #3B82F6;
            --blue-deep: #2563EB;
            --blue-dark: #1E40AF;
            --navy: #1E3A8A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(180deg, var(--white) 0%, var(--snow) 50%, var(--ice) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background: var(--white);
            border-radius: 28px;
            padding: 48px 32px;
            box-shadow: 
                0 4px 6px -1px rgba(59, 130, 246, 0.1),
                0 20px 40px -10px rgba(59, 130, 246, 0.15),
                0 0 0 1px rgba(59, 130, 246, 0.08);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--blue-light), var(--blue), var(--blue-deep));
        }

        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
            border-radius: 24px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 30px rgba(59, 130, 246, 0.3),
                0 0 0 8px rgba(59, 130, 246, 0.1);
            position: relative;
            z-index: 1;
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--white);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--navy);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .desc {
            font-size: 15px;
            color: var(--blue-dark);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 32px;
            opacity: 0.8;
        }

        .btn-primary {
            width: 100%;
            padding: 18px 28px;
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 
                0 4px 12px rgba(59, 130, 246, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .btn-primary svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .hint-box {
            margin-top: 24px;
            padding: 16px;
            background: var(--snow);
            border-radius: 14px;
            border: 1px solid var(--blue-light);
        }

        .hint-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--blue-deep);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hint-title svg {
            width: 16px;
            height: 16px;
            fill: var(--blue);
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--blue-dark);
            line-height: 1.4;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-num {
            width: 22px;
            height: 22px;
            background: var(--blue);
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: -2px;
        }

        .safari-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--ice);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--blue-deep);
            margin-top: 8px;
        }

        .safari-badge svg {
            width: 14px;
            height: 14px;
            fill: var(--blue);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
                <circle cx="12" cy="18" r="1.5"/>
            </svg>
        </div>

        <h1>UDID Устройства</h1>
        <p class="desc">Уникальный идентификатор для регистрации в Apple Developer Program</p>

        <a href="https://udid.tech" class="btn-primary" id="actionBtn" target="_blank">
            <svg viewBox="0 0 24 24">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                <path d="M15 3h6v6"/>
                <path d="M10 14L21 3"/>
            </svg>
            Передать UDID
        </a>

        <div class="hint-box">
            <div class="hint-title">
                <svg viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Как получить UDID
            </div>
            <div class="step">
                <div class="step-num">1</div>
                <div>Нажмите кнопку выше — откроется Safari</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div>Установите профиль конфигурации</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div>
                    Разрешите в настройках: Настройки → Основные → VPN и управление устройством → Профиль
                    <div class="safari-badge">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        Safari
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ripple effect
        document.getElementById('actionBtn').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            btn.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
</body>
</html>
